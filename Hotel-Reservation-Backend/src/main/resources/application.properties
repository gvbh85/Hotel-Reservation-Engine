spring.application.name=hotel-reservation-backend

server.port=8080

# ==========================
# DATABASE CONFIGURATION
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/hoteldb
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA CONFIGURATION
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# REDIS CONFIGURATION
# ==========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================
# JWT CONFIGURATION
# ==========================
jwt.secret=SG90ZWxSZXNlcnZhdGlvbkJhY2tlbmRTZWNyZXRLZXlGb3JKV1QyMDI2SG90ZWxSZXNlcnZhdGlvbkJhY2tlbmRTZWNyZXRLZXk=
jwt.expiration=86400000